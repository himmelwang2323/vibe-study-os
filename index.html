<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Finals Board</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="期末盘点导航">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 32 32" role="img">
              <path d="M7 6h18v20H7z" />
              <path d="M11 11h10M11 16h10M11 21h6" />
            </svg>
          </div>
          <div>
            <strong>Finals Board</strong>
            <span>课程 / 项目 / 材料</span>
          </div>
        </div>

        <nav class="nav-pills" aria-label="主视图">
          <button class="nav-pill active" data-view="dashboard" title="总览">
            <span class="icon" aria-hidden="true">⌂</span>
            总览
          </button>
          <button class="nav-pill" data-view="projects" title="项目看板">
            <span class="icon" aria-hidden="true">▦</span>
            项目看板
          </button>
          <button class="nav-pill" data-view="actions" title="今日行动">
            <span class="icon" aria-hidden="true">→</span>
            今日行动
          </button>
          <button class="nav-pill" data-view="materials" title="材料准备">
            <span class="icon" aria-hidden="true">□</span>
            材料准备
          </button>
        </nav>

        <div class="sidebar-note">
          <span>本地草稿</span>
          <strong id="saveState">已自动保存</strong>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Finals Project Review</p>
            <h1>期末项目盘点</h1>
          </div>
          <div class="topbar-actions">
            <button class="ghost-button" id="clearData" title="清空本地数据">
              <span aria-hidden="true">×</span>
            </button>
            <button class="primary-button" data-view-jump="projects">新增项目</button>
          </div>
        </header>

        <section class="view active" id="dashboard" aria-label="总览">
          <div class="metric-grid">
            <article class="metric-panel">
              <span>期末项目</span>
              <strong id="projectCount">0</strong>
              <small>门课程/任务</small>
            </article>
            <article class="metric-panel">
              <span>高风险</span>
              <strong id="highRiskCount">0</strong>
              <small>需要优先处理</small>
            </article>
            <article class="metric-panel">
              <span>7 天内截止</span>
              <strong id="soonCount">0</strong>
              <small>请尽快收尾</small>
            </article>
            <article class="metric-panel">
              <span>总体完成率</span>
              <strong id="overallProgress">0%</strong>
              <small id="doneSummary">0 项待办已完成</small>
            </article>
          </div>

          <div class="dashboard-grid">
            <section class="work-panel">
              <div class="section-heading">
                <div>
                  <p class="eyebrow">Priority</p>
                  <h2>最需要先看的项目</h2>
                </div>
                <button class="text-button" data-view-jump="actions">行动清单</button>
              </div>
              <div class="stack-list" id="priorityList"></div>
            </section>

            <section class="work-panel">
              <div class="section-heading">
                <div>
                  <p class="eyebrow">Deadlines</p>
                  <h2>近期截止</h2>
                </div>
                <button class="text-button" data-view-jump="projects">全部项目</button>
              </div>
              <div class="deadline-rail" id="deadlineRail"></div>
            </section>
          </div>

          <section class="work-panel">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Preparation</p>
                <h2>材料缺口</h2>
              </div>
              <button class="text-button" data-view-jump="materials">整理材料</button>
            </div>
            <div class="material-gap-grid" id="materialGapGrid"></div>
          </section>
        </section>

        <section class="view" id="projects" aria-label="项目看板">
          <div class="two-column">
            <form class="editor-panel" id="projectForm">
              <h2>新增期末项目</h2>
              <label>
                项目名称
                <input name="title" required placeholder="例如：数据库课程期末报告" />
              </label>
              <div class="form-row">
                <label>
                  课程
                  <input name="course" required placeholder="课程名称" />
                </label>
                <label>
                  类型
                  <select name="type">
                    <option>论文</option>
                    <option>大作业</option>
                    <option>考试复习</option>
                    <option>Presentation</option>
                    <option>实验报告</option>
                  </select>
                </label>
              </div>
              <div class="form-row">
                <label>
                  截止日期
                  <input name="due" type="date" required />
                </label>
                <label>
                  状态
                  <select name="status">
                    <option>未开始</option>
                    <option selected>进行中</option>
                    <option>待修改</option>
                    <option>已提交</option>
                  </select>
                </label>
              </div>
              <div class="form-row">
                <label>
                  重要程度
                  <select name="importance">
                    <option>低</option>
                    <option selected>中</option>
                    <option>高</option>
                  </select>
                </label>
                <label>
                  风险
                  <select name="risk">
                    <option>低</option>
                    <option selected>中</option>
                    <option>高</option>
                  </select>
                </label>
              </div>
              <label>
                剩余待办
                <textarea name="todos" rows="5" placeholder="每行一个待办，例如：完成初稿"></textarea>
              </label>
              <label>
                材料 / 准备项
                <textarea name="materials" rows="5" placeholder="每行一个材料，例如：课程 PPT / 数据集 / 参考文献"></textarea>
              </label>
              <label>
                当前卡点
                <textarea name="blocker" rows="3" placeholder="哪里还不清楚，或最容易拖住的点"></textarea>
              </label>
              <label>
                下一步动作
                <input name="nextAction" placeholder="写成今天能做的一步" />
              </label>
              <button class="primary-button" type="submit">保存项目</button>
            </form>

            <div class="list-panel">
              <div class="section-heading">
                <div>
                  <p class="eyebrow">Board</p>
                  <h2>项目卡片</h2>
                </div>
                <div class="segmented" role="group" aria-label="项目过滤">
                  <button class="active" data-project-filter="all">全部</button>
                  <button data-project-filter="active">未完成</button>
                  <button data-project-filter="risk">高风险</button>
                  <button data-project-filter="done">已提交</button>
                </div>
              </div>
              <div class="project-grid" id="projectList"></div>
            </div>
          </div>
        </section>

        <section class="view" id="actions" aria-label="今日行动">
          <section class="work-panel">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Today</p>
                <h2>今日建议处理顺序</h2>
              </div>
              <span class="soft-label">按风险、截止日期和进度自动排序</span>
            </div>
            <div class="action-list" id="actionList"></div>
          </section>
        </section>

        <section class="view" id="materials" aria-label="材料准备">
          <section class="work-panel">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Materials</p>
                <h2>材料与准备项</h2>
              </div>
              <button class="text-button" data-view-jump="projects">补充项目</button>
            </div>
            <div class="material-board" id="materialBoard"></div>
          </section>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
